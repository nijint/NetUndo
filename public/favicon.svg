<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14532d" /> <!-- Forest Green -->
      <stop offset="100%" stop-color="#4ade80" /> <!-- Mint -->
    </linearGradient>
  </defs>
  
  <!-- 4 Range Bars of increasing height -->
  <rect x="10" y="70" width="14" height="20" rx="4" fill="url(#grad1)" />
  <rect x="32" y="50" width="14" height="40" rx="4" fill="url(#grad1)" />
  <rect x="54" y="30" width="14" height="60" rx="4" fill="url(#grad1)" />
  <rect x="76" y="10" width="14" height="80" rx="4" fill="url(#grad1)" />
</svg>